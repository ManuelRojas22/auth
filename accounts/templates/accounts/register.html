{% extends 'accounts/base.html' %}
{% block title %}Registro{% endblock %}
{% block content %}
    <h1>Crear Cuenta</h1>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Registrarse</button>
    </form>
    <div class="links">
        <a href="{% url 'login' %}">Ya tengo una cuenta</a>
    </div>
{% endblock %}
