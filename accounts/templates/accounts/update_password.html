{% extends 'accounts/base.html' %}
{% block title %}Actualizar Contraseña{% endblock %}
{% block content %}

        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Actualizar</button>
    </form>
    <div class="links">
        <a href="{% url 'home' %}">Volver al inicio</a>
    </div>
{% endblock %}
